name: Build & Release Caddy

on:
  push:
    branches:
      - main  # 每次 push 到 main 分支时触发（你可以调整为其他分支）
  workflow_dispatch:  # 手动触发 CI/CD 流程

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 步骤1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2: 设置 Go 环境
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'  # 使用最新版 Go

      # 步骤3: 安装 xcaddy（确保每次使用最新版本）
      - name: Install xcaddy
        run: |
          go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest  # 安装最新的 xcaddy

      # 步骤4: 使用 xcaddy 编译 Caddy，并加上 forwardproxy 插件
      - name: Build Caddy for Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 xcaddy build --with github.com/caddyserver/forwardproxy

          # 移动二进制文件并命名为适合的平台
          mv caddy caddy-linux-amd64

      # 步骤5: 获取自动版本号
      - name: Get version number
        id: version
        run: |
          VERSION=$(git describe --tags --always)
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_ENV

      # 步骤6: 创建 Release 并上传二进制文件
      - name: Create Release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: caddy-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub 的 token，用于创建 Release 和上传文件
